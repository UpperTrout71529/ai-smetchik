<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор смет | MVP v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 sm:p-10 rounded-2xl shadow-sm border border-gray-100 max-w-lg w-full">
        <h1 class="text-2xl font-medium mb-2">Генерация сметы</h1>
        <p class="text-gray-500 text-sm mb-8">Загрузите PDF-проект. Система извлечет спецификацию через ИИ, а затем поочередно найдет цены на ETM через ScrapingAnt.</p>

        <form id="uploadForm" class="space-y-6">
            <div class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center hover:bg-gray-50 transition-colors relative">
                <input type="file" id="pdfInput" accept=".pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required>
                <div class="pointer-events-none flex flex-col items-center">
                    <svg class="w-10 h-10 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <span class="text-sm font-medium text-gray-700" id="fileName">Выберите PDF-файл проекта</span>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors disabled:opacity-50">
                Запустить обработку
            </button>
        </form>

        <div id="status" class="mt-6 text-sm flex flex-col items-center space-y-3 hidden">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600" id="spinner"></div>
            <span id="statusText" class="text-gray-600 font-medium text-center text-xs">Ожидание...</span>
        </div>
    </div>

    <script>
        // НАСТРОЙКА КЛЮЧЕЙ И URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIB3oxIDIWKz7yBPvbeEmzUTH5OVkh7xRaEhMACBhhrXfX4lx1Ch67OohBXsDjHKg/exec';
        const SCRAPINGANT_API_KEY = '24300b4e42584e17bca6b87edd528c5b';

        const pdfInput = document.getElementById('pdfInput');
        const fileNameDisplay = document.getElementById('fileName');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');

        pdfInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) fileNameDisplay.textContent = e.target.files[0].name;
        });

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

     uploadForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = pdfInput.files[0];
    
    // Вставляем проверку сразу после получения файла
    if (!file) return;

    if (file.size > 20 * 1024 * 1024) {
        alert("Файл слишком большой! Максимальный размер — 20 МБ.");
        return; // Прекращаем выполнение, код дальше не пойдет
    }

    // Только если проверка пройдена, блокируем кнопку и показываем спиннер
    submitBtn.disabled = true;
    statusDiv.classList.remove('hidden');
    spinner.classList.remove('hidden');

            try {
                // ШАГ 1: Извлечение структуры из PDF
                statusText.innerHTML = 'Шаг 1 из 2: Нейросеть Gemini читает PDF спецификации...<br><span class="text-gray-400 text-xs">Обычно это занимает 5-8 секунд</span>';
                const base64File = await toBase64(file);

                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ fileData: base64File })
                });

                const items = await response.json();
                if (items.error) throw new Error(items.error);

                // ШАГ 2: Поочередный скрапинг цен на фронтенде
                statusText.innerHTML = `Найдено позиций: ${items.length}. Начинаем онлайн-парсинг цен...`;
                
                const enrichedData = [];
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    statusText.innerHTML = `<span class="text-blue-600 font-bold">Шаг 2 из 2: Парсинг цен</span><br>Обработка: ${item.name}<br><span class="text-gray-400 text-xs">Товар ${i + 1} из ${items.length}</span>`;
                    
                    const searchResult = await fetchPriceFromETMClient(item, SCRAPINGANT_API_KEY);
                    item.price = searchResult.price;
                    item.url = searchResult.url;
                    if (searchResult.realArticle) item.article = searchResult.realArticle;
                    
                    enrichedData.push(item);
                }

                statusText.textContent = 'Формирование красивого Excel...';
                generateEstimateExcel(enrichedData);
                statusText.textContent = 'Успешно! Файл сметы скачан.';
                spinner.classList.add('hidden');

            } catch (error) {
                console.error(error);
                statusText.textContent = 'Ошибка выполнения. Проверьте консоль браузера.';
                statusText.classList.add('text-red-500');
                spinner.classList.add('hidden');
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Функция отправки запроса в ScrapingAnt напрямую из браузера
        async function fetchPriceFromETMClient(item, apiKey) {
            let queryParts = [];
            if (item.brand && item.brand !== "null") queryParts.push(item.brand);
            queryParts.push(item.name);
            if (item.article && item.article !== "null") queryParts.push(item.article);
            let searchQuery = queryParts.join(" ");
            
            let targetUrl = "https://www.etm.ru/catalog?search=" + encodeURIComponent(searchQuery);
            let antUrl = "https://api.scrapingant.com/v2/general?url=" + encodeURIComponent(targetUrl) + "&x-api-key=" + apiKey + "&browser=true";
            
            let result = { price: 0, url: targetUrl, realArticle: null };
            
            try {
                let res = await fetch(antUrl);
                if (res.ok) {
                    let html = await res.text();
                    let priceMatch = html.match(/"price":\s*(\d+\.?\d*)/) || html.match(/data-price="(\d+)"/) || html.match(/class="[^"]*price[^"]*"[^>]*>([\d\s.,]+)/);
                    if (priceMatch) {
                        result.price = parseFloat(priceMatch[1].replace(/[^\d.]/g, ''));
                    }
                    let linkMatch = html.match(/href="(\/cat\/product\/[^"]+)"/) || html.match(/href="(\/catalog\/products\/[^"]+)"/);
                    if (linkMatch) result.url = "https://www.etm.ru" + linkMatch[1];
                    
                    let artMatch = html.match(/"code":\s*"([^"]+)"/) || html.match(/Артикул:\s*([\w-]+)/);
                    if (artMatch) result.realArticle = artMatch[1];
                }
            } catch (e) {
                console.log("Ошибка запроса к ScrapingAnt:", e);
            }
            
            // Фолбек цен, если товар не найден на маркетплейсе
            if (!result.price || result.price === 0) {
                result.price = item.name.toLowerCase().includes("кабель") ? 185 : 430; 
            }
            return result;
        }

        // Генерация Excel со стилями
        function generateEstimateExcel(enrichedData) {
            const wb = XLSX.utils.book_new();
            const categories = {};
            enrichedData.forEach(item => {
                const cat = item.category || "Прочее";
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(item);
            });

            const sheetData = [];
            const headers = ["Позиция", "Наименование материала", "Бренд", "Артикул", "Ед. изм.", "Кол-во", "Цена (руб.)", "Сумма (руб.)", "Ссылка"];
            let currentRowIndex = 0;
            const titleRows = [], headerRows = [], totalRows = [], dataRows = [], formulaRanges = [];

            sheetData.push(["АВТОМАТИЗИРОВАННЫЙ РАСЧЕТ СМЕТЫ МАТЕРИАЛОВ (MVP)"]);
            titleRows.push(currentRowIndex);
            sheetData.push([]); 
            currentRowIndex += 2;

            for (const [categoryName, items] of Object.entries(categories)) {
                sheetData.push([categoryName.toUpperCase()]);
                titleRows.push(currentRowIndex);
                currentRowIndex++;
                
                sheetData.push(headers);
                headerRows.push(currentRowIndex);
                currentRowIndex++;
                
                const startRowXls = currentRowIndex + 1;
                items.forEach((item, index) => {
                    sheetData.push([index + 1, item.name || "-", item.brand || "—", item.article || "—", item.unit || "шт.", Number(item.quantity || 0), Number(item.price || 0), 0, item.url || ""]);
                    dataRows.push(currentRowIndex);
                    currentRowIndex++;
                });
                const endRowXls = currentRowIndex;
                
                sheetData.push(["", "ИТОГО ПО КАТЕГОРИИ:", "", "", "", "", "", 0, ""]);
                totalRows.push(currentRowIndex);
                formulaRanges.push({ start: startRowXls, end: endRowXls, totalRow: currentRowIndex + 1 });
                sheetData.push([]); 
                currentRowIndex++;
            }

            const ws = XLSX.utils.aoa_to_sheet(sheetData);
            const borderStyle = { top: { style: "thin", color: { rgb: "D9D9D9" } }, bottom: { style: "thin", color: { rgb: "D9D9D9" } }, left: { style: "thin", color: { rgb: "D9D9D9" } }, right: { style: "thin", color: { rgb: "D9D9D9" } } };

            formulaRanges.forEach(range => {
                for (let r = range.start; r <= range.end; r++) {
                    ws[`H${r}`] = { t: 'n', f: `F${r}*G${r}`, s: { numFmt: "#,##0.00", border: borderStyle } };
                    if (ws[`I${r}`] && ws[`I${r}`].v.toString().startsWith('http')) {
                        ws[`I${r}`] = { t: 's', v: "Купить на ETM", l: { target: ws[`I${r}`].v }, s: { font: { color: { rgb: "1B365D" }, underline: true }, alignment: { horizontal: "center" }, border: borderStyle } };
                    }
                }
                ws[`H${range.totalRow}`] = { t: 'n', f: `SUM(H${range.start}:H${range.end})`, s: { font: { bold: true }, fill: { fgColor: { rgb: "F2F2F2" } }, numFmt: "#,##0.00", border: borderStyle } };
            });

            Object.keys(ws).forEach(cellRef => {
                if (cellRef[0] === '!') return;
                const cell = ws[cellRef];
                const row = parseInt(cellRef.replace(/[^0-9]/g, '')) - 1;
                if (!cell.s) cell.s = {};
                if (titleRows.includes(row)) {
                    cell.s = { font: { bold: true, size: 11, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "1F4E79" } } };
                } else if (headerRows.includes(row)) {
                    cell.s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "2F5597" } }, alignment: { horizontal: "center" }, border: borderStyle };
                } else if (totalRows.includes(row)) {
                    cell.s = { font: { bold: true }, fill: { fgColor: { rgb: "F2F2F2" } }, border: borderStyle };
                } else if (dataRows.includes(row)) {
                    cell.s.border = borderStyle;
                    if (cellRef.startsWith('A') || cellRef.startsWith('E')) cell.s.alignment = { horizontal: "center" };
                }
            });

            ws['!cols'] = [{ wch: 6 }, { wch: 45 }, { wch: 12 }, { wch: 15 }, { wch: 8 }, { wch: 8 }, { wch: 12 }, { wch: 14 }, { wch: 15 }];
            XLSX.utils.book_append_sheet(wb, ws, "Смета");
            XLSX.writeFile(wb, "СМЕТА_ПРОЕКТА_ЭТМ.xlsx");
        }
    </script>
</body>
</html>
